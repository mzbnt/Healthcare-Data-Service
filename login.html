<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录界面</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 20% 20%, #80d0ff 0%, #009eff 46%, #072d56 100%);
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .hero {
      position: absolute;
      top: -80px;
      right: -80px;
      width: 320px;
      height: 320px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      filter: blur(32px);
      animation: float 6s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(10px) rotate(8deg); }
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: 0 18px 38px rgba(8, 9, 28, 0.25), 0 8px 12px rgba(8, 9, 28, 0.22);
      width: min(420px, 100%);
      max-width: 420px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.36);
      padding: 36px 28px 28px;
      animation: appear 0.45s ease-out;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card h1 {
      margin: 0 0 18px;
      font-size: 26px;
      color: #0f172a;
      text-align: center;
      letter-spacing: 0.4px;
    }

    .card p {
      margin: 0 0 20px;
      color: #4b5563;
      text-align: center;
      font-size: 14px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      color: #475569;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      background-color: #f8fafc;
      color: #0f172a;
    }

    .input-group input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
      outline: none;
      background-color: #ffffff;
    }

    .input-group input::placeholder {
      color: #94a3b8;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(90deg, #2563eb, #1d4ed8);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.38);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
    }

    .msg {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
      transition: color 0.2s ease;
    }

    .msg.error { color: #dc2626; }
    .msg.success { color: #059669; }

    .helper-link {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .helper-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .helper-link a:hover { text-decoration: underline; }

    @media (max-width: 380px) {
      .card { padding: 24px 16px 20px; }
      .card h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>用户登录</h1>
    <p>欢迎使用医疗数据服务平台，请输入账号与密码完成登录。</p>
    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" required />
      </div>
      <div class="input-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required minlength="6" />
      </div>
      <button type="submit" class="btn">登录</button>
    </form>
    <div id="message" class="msg"></div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const messageEl = document.getElementById('message');

    loginForm.addEventListener('submit', function (event) {
      event.preventDefault();
      messageEl.textContent = '';
      messageEl.className = 'msg';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        messageEl.textContent = '用户名和密码都不能为空。';
        messageEl.classList.add('error');
        return;
      }

      if (password.length < 6) {
        messageEl.textContent = '密码需要至少6位。';
        messageEl.classList.add('error');
        return;
      }

      // TODO: 这里调用后端登录接口，例如：
      // fetch('/api/login', { method: 'POST', body: JSON.stringify({ username, password }), ... })
      // 目前仅为演示前端验证和显示结果
      setTimeout(() => {
        if (username === 'admin' && password === '123456') {
          messageEl.textContent = '登录成功！正在跳转...';
          messageEl.classList.add('success');
          // window.location.href = '/dashboard.html';
        } else {
          messageEl.textContent = '用户名或密码错误，请重试。';
          messageEl.classList.add('error');
        }
      }, 300);
    });
  </script>
</body>
</html>
