<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册新用户</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at 80% 10%, #ff99c8 0%, #fc6f96 42%, #632061 100%);
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }
    .hero {
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 320px;
      height: 320px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      filter: blur(28px);
      animation: float2 6s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes float2 {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(-6deg); }
    }
    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: 0 18px 38px rgba(20, 20, 60, 0.26), 0 8px 12px rgba(20, 20, 60, 0.22);
      width: min(450px, 100%);
      max-width: 450px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.36);
      padding: 36px 28px 28px;
      animation: appear 0.45s ease-out;
    }
    .card h1 { margin: 0 0 12px; font-size: 26px; color: #0f172a; text-align: center; }
    .card p { margin: 0 0 18px; color: #475569; text-align: center; font-size: 14px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; color: #475569; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
    .input-group input { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; transition: border-color 0.2s ease, box-shadow 0.2s ease; background-color: #f8fafc; }
    .input-group input:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.2); outline: none; background-color: #ffffff; }
    .input-group input::placeholder { color: #94a3b8; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; color: white; background: linear-gradient(90deg, #ec4899, #db2777); cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 8px 20px rgba(236, 72, 153, 0.28); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(236, 72, 153, 0.38); }
    .btn:active { transform: translateY(0); box-shadow: 0 6px 14px rgba(236, 72, 153, 0.25); }
    .msg { margin-top: 14px; text-align: center; font-size: 14px; min-height: 20px; transition: color 0.2s ease; }
    .msg.error { color: #dc2626; }
    .msg.success { color: #059669; }
    .helper-link { margin-top: 18px; text-align: center; font-size: 14px; }
    .helper-link a { color: #ec4899; text-decoration: none; font-weight: 600; }
    .helper-link a:hover { text-decoration: underline; }
    @media (max-width: 380px) { .card { padding: 24px 16px 20px; } .card h1 { font-size: 22px; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>注册新账号</h1>
    <p>创建账户后即可使用医疗数据服务平台全部功能。</p>
    <form id="registerForm" autocomplete="off">
      <div class="input-group">
        <label for="newUser">用户名</label>
        <input type="text" id="newUser" name="newUser" placeholder="设置用户名" required />
      </div>
      <div class="input-group">
        <label for="newPassword">密码</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="设置密码（至少6位）" required minlength="6" />
      </div>
      <div class="input-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码" required minlength="6" />
      </div>
      <button type="submit" class="btn">注册</button>
    </form>
    <div id="message" class="msg"></div>
    <div class="helper-link"><a href="login.html">已有账号？返回登录</a></div>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const messageEl = document.getElementById('message');

    registerForm.addEventListener('submit', function (event) {
      event.preventDefault();
      messageEl.textContent = '';
      messageEl.className = 'msg';

      const newUser = document.getElementById('newUser').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newUser || !newPassword || !confirmPassword) {
        messageEl.textContent = '请完整填写所有必填项。';
        messageEl.classList.add('error');
        return;
      }

      if (newPassword.length < 6) {
        messageEl.textContent = '密码至少6位。';
        messageEl.classList.add('error');
        return;
      }

      if (newPassword !== confirmPassword) {
        messageEl.textContent = '两次输入的密码不一致。';
        messageEl.classList.add('error');
        return;
      }

      // TODO: 调用后端注册接口
      setTimeout(() => {
        messageEl.textContent = '注册成功，请返回登录。';
        messageEl.classList.add('success');
      }, 300);
    });
  </script>
</body>
</html>
